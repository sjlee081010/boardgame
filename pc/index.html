<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <div class="container" style="background-image: url('img/허잡부.jpg');">
                <div class="active-box">
                    <div class="content">
                        <div class="top">
                            <h3 class="label">인물 설정서</h3>
                            <h1 class="name">허잡부</h1>
                            <h2 class="info">55세 남성</h2>
                            <p class="quote">"끅, 씨, 내가 왕년에는 말이야,
                                <br>어? 내가 이런 곳에 있을 사람이
                                <br>아니라고. 당신들이 뭘 알아?"
                            </p>
                        </div>
                        <div class="bottom">
                            <h3 class="label">인물 공개정보</h3>
                            <p class="info">깡마르고 초췌한 인상의 중년 남성.
                                변변한 직장없이 용역 업체를 통해
                                노가다를 하며 하루벌어 하루먹고
                                사는 사람이다. 최근에는 그 마저도
                                하지 않고 정부 지원금으로 근근히
                                살아가고 있다. 아마도 건설현장에서
                                사고를 당한 이후부터인 것 같다.</p>
                        </div>
                    </div>
                    <form class="input-container">
                        <input type="text" id="input" required="">
                        <label for="input" class="label">암호를 입력하세요.</label>
                        <div class="underline"></div>
                    </form>
                </div>
            </div>
        </section>
        <section></section>
        <section></section>
        <section></section>
        <section></section>
        <section></section>
    </main>
    <script src="script.js"></script>
</body>

</html>
